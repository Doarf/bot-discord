<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 220" shape-rendering="crispEdges">
  <!-- Pixel-art rendition of the Discord "Clyde" mark, traced from the official
       24x24 outline: raised shoulders with a center brow dip, widening sides,
       two wing tips at the bottom and oval white eyes. Blurple #5865F2. -->
  <g fill="#5865F2">
    <!-- shoulders -->
    <rect x="70" y="30" width="30" height="10"/>
    <rect x="140" y="30" width="30" height="10"/>
    <!-- brow with center dip -->
    <rect x="40" y="40" width="160" height="10"/>
    <rect x="40" y="50" width="160" height="10"/>
    <!-- widening sides -->
    <rect x="30" y="60" width="180" height="10"/>
    <rect x="30" y="70" width="180" height="10"/>
    <rect x="20" y="80" width="200" height="10"/>
    <rect x="20" y="90" width="200" height="10"/>
    <rect x="10" y="100" width="220" height="10"/>
    <!-- eye rows -->
    <rect x="10" y="110" width="60" height="10"/>
    <rect x="90" y="110" width="60" height="10"/>
    <rect x="170" y="110" width="60" height="10"/>
    <rect x="10" y="120" width="50" height="10"/>
    <rect x="100" y="120" width="40" height="10"/>
    <rect x="180" y="120" width="50" height="10"/>
    <rect x="0" y="130" width="60" height="10"/>
    <rect x="100" y="130" width="40" height="10"/>
    <rect x="180" y="130" width="60" height="10"/>
    <rect x="0" y="140" width="60" height="10"/>
    <rect x="100" y="140" width="40" height="10"/>
    <rect x="180" y="140" width="60" height="10"/>
    <rect x="0" y="150" width="70" height="10"/>
    <rect x="90" y="150" width="60" height="10"/>
    <rect x="170" y="150" width="70" height="10"/>
    <!-- jaw -->
    <rect x="0" y="160" width="240" height="10"/>
    <rect x="0" y="170" width="240" height="10"/>
    <!-- chin notch between the wings -->
    <rect x="0" y="180" width="80" height="10"/>
    <rect x="160" y="180" width="80" height="10"/>
    <!-- wings -->
    <rect x="10" y="190" width="70" height="10"/>
    <rect x="160" y="190" width="70" height="10"/>
    <rect x="30" y="200" width="40" height="10"/>
    <rect x="170" y="200" width="40" height="10"/>
    <rect x="50" y="210" width="20" height="10"/>
    <rect x="170" y="210" width="20" height="10"/>
  </g>
  <!-- oval eyes -->
  <g fill="#FFFFFF">
    <rect x="70" y="110" width="20" height="10"/>
    <rect x="150" y="110" width="20" height="10"/>
    <rect x="60" y="120" width="40" height="10"/>
    <rect x="140" y="120" width="40" height="10"/>
    <rect x="60" y="130" width="40" height="10"/>
    <rect x="140" y="130" width="40" height="10"/>
    <rect x="60" y="140" width="40" height="10"/>
    <rect x="140" y="140" width="40" height="10"/>
    <rect x="70" y="150" width="20" height="10"/>
    <rect x="150" y="150" width="20" height="10"/>
  </g>
</svg>
