<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 130" shape-rendering="crispEdges">
  <!-- Pixel-art Discord-style mascot (blurple #5865F2) -->
  <g fill="#5865F2">
    <!-- top ears -->
    <rect x="30" y="0" width="40" height="10"/>
    <rect x="110" y="0" width="40" height="10"/>
    <!-- head -->
    <rect x="20" y="10" width="140" height="10"/>
    <rect x="10" y="20" width="160" height="10"/>
    <rect x="10" y="30" width="160" height="10"/>
    <!-- eye rows -->
    <rect x="0" y="40" width="40" height="10"/>
    <rect x="60" y="40" width="60" height="10"/>
    <rect x="140" y="40" width="40" height="10"/>
    <rect x="0" y="50" width="30" height="10"/>
    <rect x="70" y="50" width="40" height="10"/>
    <rect x="150" y="50" width="30" height="10"/>
    <rect x="0" y="60" width="30" height="10"/>
    <rect x="70" y="60" width="40" height="10"/>
    <rect x="150" y="60" width="30" height="10"/>
    <rect x="0" y="70" width="40" height="10"/>
    <rect x="60" y="70" width="60" height="10"/>
    <rect x="140" y="70" width="40" height="10"/>
    <!-- chin -->
    <rect x="0" y="80" width="180" height="10"/>
    <rect x="10" y="90" width="160" height="10"/>
    <rect x="20" y="100" width="140" height="10"/>
    <!-- wing tips -->
    <rect x="20" y="110" width="30" height="10"/>
    <rect x="130" y="110" width="30" height="10"/>
    <rect x="20" y="120" width="20" height="10"/>
    <rect x="140" y="120" width="20" height="10"/>
  </g>
  <!-- eyes -->
  <g fill="#FFFFFF">
    <rect x="40" y="40" width="20" height="10"/>
    <rect x="120" y="40" width="20" height="10"/>
    <rect x="30" y="50" width="40" height="10"/>
    <rect x="110" y="50" width="40" height="10"/>
    <rect x="30" y="60" width="40" height="10"/>
    <rect x="110" y="60" width="40" height="10"/>
    <rect x="40" y="70" width="20" height="10"/>
    <rect x="120" y="70" width="20" height="10"/>
  </g>
</svg>
